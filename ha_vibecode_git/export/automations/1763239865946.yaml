id: '1763239865946'
alias: 'System: Sleep Mode Automations'
description: Disables automations when sleep focus mode is on. When re-enabling, re-applies
  any still-active modes (away, guest) so multi-labeled automations aren't incorrectly
  turned on.
triggers:
- entity_id:
  - input_boolean.iphone_sleep_focus_mode
  platform: state
- entity_id:
  - input_boolean.iphone_charging
  platform: state
conditions: []
actions:
- else:
  - action: automation.turn_on
    data: {}
    target:
      label_id: sleeping_disabled
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: device_tracker.matthews_iphone_17_pro
        state: home
    then:
    - action: automation.turn_off
      data:
        stop_actions: true
      target:
        label_id: away_mode_disables
  - if:
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'on'
    then:
    - action: automation.turn_off
      data:
        stop_actions: true
      target:
        label_id: guest_mode_disabled
  if:
  - condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.iphone_sleep_focus_mode
      state:
      - 'on'
    - condition: state
      entity_id: input_boolean.iphone_charging
      state:
      - 'on'
  then:
  - action: automation.turn_off
    data:
      stop_actions: true
    target:
      label_id: sleeping_disabled
mode: single
enabled: true
