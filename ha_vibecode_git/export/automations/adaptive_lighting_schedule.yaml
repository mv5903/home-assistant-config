id: adaptive_lighting_schedule
alias: 'Lighting: Adaptive Sun Schedule'
description: Every 30 minutes, refresh adaptive white color temperature on all managed
  lights that are currently on, via apply_current_color (which preserves each light's
  brightness, so theater-dimmed lights keep their 5% and just track color temp). Skips
  during sleep mode or Color/RGB mode.
triggers:
- minutes: /30
  trigger: time_pattern
conditions:
- condition: state
  entity_id: light.lights
  state: 'on'
- condition: state
  entity_id: input_boolean.iphone_sleep_focus_mode
  state: 'off'
- condition: state
  entity_id: input_boolean.adaptive_lighting_paused
  state: 'off'
actions:
- action: script.apply_current_color
  data:
    targets: '{{ expand(''light.lights'') | selectattr(''state'',''eq'',''on'') |
      map(attribute=''entity_id'') | list }}'
    transition: 10
mode: single
enabled: true
