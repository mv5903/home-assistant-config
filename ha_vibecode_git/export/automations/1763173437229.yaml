id: '1763173437229'
alias: 'Notification: Minecraft Server'
description: Notifies when players join the Minecraft server
triggers:
- trigger: numeric_state
  entity_id:
  - sensor.minecraft_server_player_count
  above: 0
conditions: []
actions:
- action: notify.mobile_app_matthews_iphone_17_pro
  data:
    title: Minecraft Server
    message: A player joined! {{ states('sensor.minecraft_server_player_count') }}
      player(s) online.
mode: single
enabled: true
