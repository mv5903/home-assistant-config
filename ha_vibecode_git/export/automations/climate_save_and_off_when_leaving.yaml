id: climate_save_and_off_when_leaving
alias: 'Climate: Save and Turn Off When Leaving'
description: Immediately saves current AC state when leaving home, then turns off
  after 5 min delay
triggers:
- trigger: state
  entity_id: person.matt
  from: home
  to: not_home
conditions: []
actions:
- if:
  - condition: template
    value_template: '{{ states(''climate.living_room'') != ''off'' }}'
  then:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.ac_was_on_when_left
  - action: select.select_option
    target:
      entity_id: input_select.ac_previous_mode
    data:
      option: '{{ states(''climate.living_room'') }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.ac_previous_temperature
    data:
      value: '{{ state_attr(''climate.living_room'', ''temperature'') | float(72)
        }}'
  - action: notify.mobile_app_matthews_iphone
    data:
      title: Left Home
      message: AC was {{ states('climate.living_room') }} at {{ state_attr('climate.living_room',
        'temperature') | int }}°. Saved — will turn off in 5 min.
  - delay:
      minutes: 5
  - condition: template
    value_template: '{{ states(''climate.living_room'') != ''off'' }}'
  - action: climate.turn_off
    target:
      entity_id: climate.living_room
  else:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.ac_was_on_when_left
mode: single
enabled: true
