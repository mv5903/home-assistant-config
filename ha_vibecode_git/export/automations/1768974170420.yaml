id: '1768974170420'
alias: 'Lighting: Party Mode'
description: Sets random RGB colors on all lights and pauses adaptive lighting. Respects
  theater mode by keeping back lights off unless eating mode is on.
triggers:
- entity_id:
  - input_button.random_scene
  trigger: state
  to: null
conditions: []
actions:
- action: input_boolean.turn_on
  target:
    entity_id: input_boolean.adaptive_lighting_paused
  data: {}
- variables:
    theater_active: '{{ states(''media_player.matthews_bedroom_2'') == ''playing''
      and state_attr(''media_player.matthews_bedroom_2'', ''media_content_type'')
      != ''music'' }}'
    eating: '{{ states(''input_boolean.eating_mode'') == ''on'' }}'
    back_lights:
    - light.living_room_vertical_light_strip
    - light.living_room_pegboard_light_strip
- repeat:
    for_each: '{{ expand(''light.lights'') | map(attribute=''entity_id'') | reject(''in'',
      back_lights if (theater_active and not eating) else []) | list }}'
    sequence:
    - target:
        entity_id: '{{ repeat.item }}'
      data:
        effect: "{{\n [\n   \"Lake\",\n   \"Plasma\",\n   \"Noise 2\"\n ]\n| random\
          \ }}"
        rgb_color: "{{ [\n  [255,100,0],[255,100,0],[255,100,0],\n  [180,0,255],[180,0,255],\n\
          \  [0,180,100],\n  [255,30,60],\n  [80,0,120]\n] | random }}"
      action: light.turn_on
- if:
  - condition: template
    value_template: '{{ theater_active and not eating }}'
  then:
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_vertical_light_strip
      - light.living_room_pegboard_light_strip
mode: single
enabled: true
