id: media_theater_mode_off
alias: 'Media: Theater Mode Off'
description: When the Apple TV has been paused/idle/stopped for 10 seconds, bring
  the five theater lights (vertical, pegboard, desk lamp, desk strip, cubby) back
  to full brightness at the current color (RGB album-art or adaptive white) via apply_current_color.
  The 10s hold prevents brief pauses/scrubbing from flapping the lights.
triggers:
- entity_id: media_player.matthews_bedroom_2
  to: paused
  for:
    seconds: 10
  trigger: state
- entity_id: media_player.matthews_bedroom_2
  to: idle
  for:
    seconds: 10
  trigger: state
- entity_id: media_player.matthews_bedroom_2
  to: standby
  for:
    seconds: 10
  trigger: state
conditions:
- condition: state
  entity_id: input_boolean.iphone_sleep_focus_mode
  state: 'off'
actions:
- action: script.apply_current_color
  data:
    brightness_pct: 100
    targets:
    - light.living_room_vertical_light_strip
    - light.living_room_pegboard_light_strip
    - light.desk_lamp
    - light.desk_light_strips
    - light.cubby
    transition: 3
mode: restart
enabled: true
