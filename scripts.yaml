google_tv_apple_tv_input_select:
  sequence:
  - if:
    - condition: state
      entity_id: media_player.matthews_bedroom_2
      state:
      - 'off'
    then:
    - action: media_player.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: media_player.matthews_bedroom_2
    - delay:
        hours: 0
        minutes: 0
        seconds: 10
        milliseconds: 0
  - action: androidtv.adb_command
    metadata: {}
    data:
      command: adb shell am start -a android.intent.action.VIEW -d "content://android.media.tv/passthrough/com.realtek.tv.passthrough%2F.hdmiinput.HDMITvInputService%2FHW151520000"
    target:
      device_id: 39e3cfe7df0b796f66ce3371953f1490
  alias: Google TV - Apple TV Input Select
  description: ''
