honeywell_fan_power_on_off:
  alias: Honeywell Fan Power On/Off
  sequence:
  - data:
      device: honeywell_fan
      command: Power
    target:
      entity_id: remote.universal_remote
    action: remote.send_command
  - action: remote.send_command
    metadata: {}
    data:
      command: rotate
      delay_secs: 1
      device: honeywell_fan
    target:
      device_id: 1fed458689f00ea87f09d7c78e813b07
  mode: single
  icon: mdi:fan
