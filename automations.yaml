- id: '1752541263640'
  alias: 'Lighting: Sleep Mode'
  description: Activates sleep lighting when iPhone sleep focus turns on. Turns off
    Color Mode first so RGB lights yield to the bedtime red sequence. Also turns on
    thermostat fan and sets temperature to 68°F.
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.iphone_sleep_focus_mode
    to: 'on'
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.adaptive_lighting_paused
  - type: turn_off
    device_id: 208694a8d5e7948b810321bfff0d2235
    entity_id: 99c5de87c3c1866fd98a968688443c06
    domain: remote
  - action: switch.turn_off
    data: {}
    target:
      entity_id:
      - switch.tapo_power_strip_49c7_smart_plug_1
      - switch.tapo_power_strip_49c7_smart_plug_4
  - action: script.apply_adaptive_lighting
    data:
      target_lights:
        area_id:
        - matthews_bedroom
        - kitchen
        - living_room
        device_id:
        - e9afd45f3065823eabf2ebdab37800e9
        - 1bb1b0cdbaa14208e037a5638b9d3210
      override_mode: bedtime
      transition: 10
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.nintendo_toy_mode_selector
    data:
      option: 'Off'
  - action: climate.set_fan_mode
    data:
      fan_mode: 'on'
    target:
      entity_id: climate.living_room
  - action: climate.set_temperature
    data:
      temperature: 68
    target:
      entity_id: climate.living_room
  mode: single
- id: '1752541408687'
  alias: 'Lighting: Wake Up Mode'
  description: Activates adaptive lighting when iPhone sleep focus turns off or All
    Lights White is pressed. Also clears the adaptive lighting pause flag. Respects
    theater mode by keeping back lights off unless eating mode is on. When triggered
    by sleep focus turning off, also turns off fan and restores daytime temperature
    (71°F).
  triggers:
  - entity_id:
    - input_button.all_lights_white
    trigger: state
  - entity_id:
    - input_boolean.iphone_sleep_focus_mode
    to: 'off'
    trigger: state
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.adaptive_lighting_paused
  - choose:
    - alias: Theater mode active - skip back lights unless eating
      conditions:
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state: playing
      - condition: template
        value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''media_content_type'')
          != ''music'' }}'
      sequence:
      - action: script.apply_adaptive_lighting
        data:
          target_lights:
            area_id:
            - matthews_bedroom
            - kitchen
            entity_id:
            - light.living_room_tv_stand_light_strip
            - light.living_room_bookshelf_light_strips
            - light.living_room_lamp
            - light.desk_light_strips
            - light.desk_lamp
          transition: 2
      - if:
        - condition: state
          entity_id: input_boolean.eating_mode
          state: 'on'
        then:
        - action: script.apply_adaptive_lighting
          data:
            target_lights:
              entity_id:
              - light.living_room_vertical_light_strip
              - light.living_room_pegboard_light_strip
            transition: 2
        else:
        - action: light.turn_off
          target:
            entity_id:
            - light.living_room_vertical_light_strip
            - light.living_room_pegboard_light_strip
    default:
    - action: script.apply_adaptive_lighting
      alias: No theater mode - all lights adaptive
      data:
        target_lights:
          area_id:
          - matthews_bedroom
          - kitchen
          - living_room
        transition: 2
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.nintendo_toy_mode_selector
    data:
      option: All
  - if:
    - condition: template
      value_template: '{{ trigger.entity_id == ''input_boolean.iphone_sleep_focus_mode''
        }}'
    then:
    - action: climate.set_fan_mode
      data:
        fan_mode: 'off'
      target:
        entity_id: climate.living_room
    - action: climate.set_temperature
      data:
        temperature: 71
      target:
        entity_id: climate.living_room
  mode: restart
- id: '1763575398211'
  alias: 'Lighting: Entrance Presence'
  description: Turns on/updates common area lights when someone enters the apartment,
    based on front door motion sensor. Always applies adaptive lighting so color temp
    is correct for time of day. Excludes bedroom and bathroom.
  triggers:
  - entity_id:
    - binary_sensor.motion_sensor_occupancy_2
    to:
    - 'on'
    platform: state
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state:
    - 'off'
  - condition: state
    entity_id: input_boolean.adaptive_lighting_paused
    state: 'off'
  actions:
  - action: script.apply_adaptive_lighting
    data:
      target_lights:
        entity_id:
        - light.living_room_vertical_light_strip
        - light.living_room_tv_stand_light_strip
        - light.living_room_pegboard_light_strip
        - light.living_room_bookshelf_light_strips
        - light.desk_light_strips
        - light.kitchen_sink_light_strip
        - light.shoerack_light
        - light.living_room_lamp
        - light.desk_lamp
      transition: 3
  mode: single
- id: '1753768667859'
  alias: 'Lighting: Kitchen Sink Night'
  description: Brightens kitchen sink light temporarily during sleep mode when motion
    detected
  triggers:
  - type: occupied
    device_id: 7a77497327e77c4f57494e46af1adda4
    entity_id: 45f4a4582c135ccff23030dc5d0394e3
    domain: binary_sensor
    trigger: device
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'on'
  actions:
  - action: light.turn_on
    metadata: {}
    data:
      brightness_pct: 100
      rgb_color:
      - 255
      - 0
      - 0
    target:
      device_id: e9afd45f3065823eabf2ebdab37800e9
  - delay:
