      minutes: 0
      seconds: 15
      milliseconds: 0
  - action: light.turn_on
    metadata: {}
    data:
      rgb_color:
      - 255
      - 0
      - 0
      brightness_pct: 1
      transition: 5
    target:
      entity_id: light.bed_frame_light_strips
  mode: single
- id: '1758772924016'
  alias: 'Lighting: Bedtime Transition'
  description: Dims all lights when phone starts charging during sleep mode
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.iphone_charging
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'on'
  actions:
  - action: light.turn_on
    metadata: {}
    data:
      rgb_color:
      - 255
      - 0
      - 0
      transition: 5
      brightness_pct: 1
      effect: Solid
    target:
      area_id:
      - matthews_bedroom
      - living_room
      - bathroom
      - kitchen
      entity_id: light.cubby
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.nintendo_toy_mode_selector
    data:
      option: 'Off'
  mode: single
- id: '1768974170420'
  alias: 'Lighting: Party Mode'
  description: Sets random RGB colors on all lights and pauses adaptive lighting.
    Respects theater mode by keeping back lights off unless eating mode is on.
  triggers:
  - entity_id:
    - input_button.random_scene
    trigger: state
    to:
  conditions: []
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.adaptive_lighting_paused
    data: {}
  - variables:
      theater_active: '{{ states(''media_player.matthews_bedroom_2'') == ''playing''
        and state_attr(''media_player.matthews_bedroom_2'', ''media_content_type'')
        != ''music'' }}'
      eating: '{{ states(''input_boolean.eating_mode'') == ''on'' }}'
      back_lights:
      - light.living_room_vertical_light_strip
      - light.living_room_pegboard_light_strip
  - repeat:
      for_each: '{{ expand(''light.lights'') | map(attribute=''entity_id'') | reject(''in'',
        back_lights if (theater_active and not eating) else []) | list }}'
      sequence:
      - target:
          entity_id: '{{ repeat.item }}'
        data:
          effect: "{{\n [\n   \"Lake\",\n   \"Plasma\",\n   \"Noise 2\"\n ]\n| random
            }}"
          rgb_color: "{{ [\n  [255,100,0],[255,100,0],[255,100,0],\n  [180,0,255],[180,0,255],\n
            \ [0,180,100],\n  [255,30,60],\n  [80,0,120]\n] | random }}"
        action: light.turn_on
  - if:
    - condition: template
      value_template: '{{ theater_active and not eating }}'
    then:
    - action: light.turn_off
      target:
        entity_id:
        - light.living_room_vertical_light_strip
        - light.living_room_pegboard_light_strip
  mode: single
- id: '1756866282389'
  alias: 'Media: Theater Mode On'
  description: 'When video (not Music) plays on the Apple TV: vertical + pegboard
    strips fully OFF; desk lamp, desk strip, and cubby dimmed to 5% (color left as-is,
    restored on exit). RGB/Color mode does NOT affect this on/off behavior. If eating
    mode is on, instead raise all five theater lights to full via apply_current_color.'
  triggers:
  - device_id: 208694a8d5e7948b810321bfff0d2235
    domain: media_player
    entity_id: b451ca0d99fa64340608813604902977
    type: playing
    trigger: device
  conditions:
  - condition: device
    type: is_on
    device_id: e5221f5ed730d77d25162de28c0382cc
    entity_id: b3e4d785b798fde8ef39f4b7a591c0ed
    domain: light
  - condition: template
    value_template: '{{ state_attr(''media_player.matthews_bedroom_2'',''media_content_type'')
      != ''music'' }}'
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  actions:
  - choose:
    - alias: Eating mode - keep all theater lights up
      conditions:
      - condition: state
        entity_id: input_boolean.eating_mode
        state: 'on'
      sequence:
      - action: script.apply_current_color
        data:
          targets:
          - light.living_room_vertical_light_strip
          - light.living_room_pegboard_light_strip
          - light.desk_lamp
          - light.desk_light_strips
          - light.cubby
          brightness_pct: 100
          transition: 5
    default:
    - alias: Vertical + pegboard off
      action: light.turn_off
      data:
        transition: 5
      target:
        entity_id:
        - light.living_room_vertical_light_strip
        - light.living_room_pegboard_light_strip
    - alias: Desk lamp/strip + cubby dim to 5%, keep color
      action: light.turn_on
      data:
        brightness_pct: 5
        transition: 5
      target:
        entity_id:
        - light.desk_lamp
        - light.desk_light_strips
        - light.cubby
  mode: restart
