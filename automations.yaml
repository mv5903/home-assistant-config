- id: '1753323920085'
  alias: 'Climate: Pre-arrival Conditioning'
  description: Restores thermostat mode, temperature, and fan_mode when arriving home.
    Forces cool if forecast high >= 65F.
  triggers:
  - platform: zone
    entity_id: device_tracker.matthews_iphone_17_pro
    zone: zone.home
    event: enter
  conditions: []
  actions:
  - action: weather.get_forecasts
    data:
      type: daily
    target:
      entity_id: weather.37_41101472054772_121_8889136975829
    response_variable: forecast_data
  - variables:
      forecast_high: '{{ forecast_data[''weather.37_41101472054772_121_8889136975829''][''forecast''][0][''temperature'']
        | float(0) }}'
      saved_temp: '{{ states(''input_number.ac_previous_temperature'') | int(72) }}'
      saved_mode: '{{ states(''input_select.ac_previous_mode'') }}'
      saved_fan: '{{ states(''input_select.ac_previous_fan_mode'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ forecast_high >= 65 }}'
      sequence:
      - action: climate.set_temperature
        data:
          temperature: '{{ saved_temp }}'
          hvac_mode: cool
        target:
          entity_id: climate.living_room
      - action: climate.set_fan_mode
        data:
          fan_mode: '{{ saved_fan }}'
        target:
          entity_id: climate.living_room
      - action: notify.mobile_app_matthews_iphone_17_pro
        data:
          title: Welcome Home
          message: 'Forecast high {{ forecast_high | round(0) }}F - cool at {{ saved_temp
            }}, fan: {{ saved_fan }}. Currently {{ state_attr(''climate.living_room'',
            ''current_temperature'') }} inside.'
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_was_on_when_left
        state: 'on'
      sequence:
      - action: climate.set_temperature
        data:
          temperature: '{{ saved_temp }}'
          hvac_mode: '{{ saved_mode }}'
        target:
          entity_id: climate.living_room
      - action: climate.set_fan_mode
        data:
          fan_mode: '{{ saved_fan }}'
        target:
          entity_id: climate.living_room
      - action: notify.mobile_app_matthews_iphone_17_pro
        data:
          title: Welcome Home
          message: 'Restored {{ saved_mode }} at {{ saved_temp }}, fan: {{ saved_fan
            }}. Currently {{ state_attr(''climate.living_room'', ''current_temperature'')
            }} inside.'
    default:
    - action: notify.mobile_app_matthews_iphone_17_pro
      data:
        title: Welcome Home
        message: 'AC was off when you left. Currently {{ state_attr(''climate.living_room'',
          ''current_temperature'') }} inside. (Forecast high: {{ forecast_high | round(0)
          }}F)'
  mode: single
- id: '1766321188342'
  alias: 'Presence: Away Mode'
  description: Disables automations when away mode is enabled. When re-enabling, re-applies
    any still-active modes (guest, sleep) so multi-labeled automations aren't incorrectly
    turned on.
  triggers:
  - entity_id:
    - device_tracker.matthews_iphone_17_pro
    attribute: latitude
    platform: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: device_tracker.matthews_iphone_17_pro
      state:
      - home
    then:
    - action: automation.turn_on
      target:
        label_id: away_mode_disables
      data: {}
    - if:
      - condition: state
        entity_id: input_boolean.guest_mode
        state: 'on'
      then:
      - action: automation.turn_off
        target:
          label_id: guest_mode_disabled
        data:
          stop_actions: true
    - if:
      - condition: and
        conditions:
        - condition: state
          entity_id: input_boolean.iphone_sleep_focus_mode
          state: 'on'
        - condition: state
          entity_id: input_boolean.iphone_charging
          state: 'on'
      then:
      - action: automation.turn_off
        target:
          label_id: sleeping_disabled
        data:
          stop_actions: true
    else:
    - action: automation.turn_off
      target:
        label_id: away_mode_disables
      data:
        stop_actions: true
  mode: single
- id: '1763097958611'
  alias: 'Presence: Guest Mode'
  description: Disables automations when guest mode is enabled. When re-enabling,
    re-applies any still-active modes (away, sleep) so multi-labeled automations aren't
    incorrectly turned on.
  triggers:
  - entity_id:
    - input_boolean.guest_mode
    to:
    platform: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.guest_mode
        state:
        - 'on'
      sequence:
      - action: automation.turn_off
        data:
          stop_actions: true
        target:
          label_id: guest_mode_disabled
    - conditions:
      - condition: state
        entity_id: input_boolean.guest_mode
        state:
        - 'off'
      sequence:
      - action: automation.turn_on
        data: {}
        target:
          label_id: guest_mode_disabled
      - if:
        - condition: not
          conditions:
          - condition: state
            entity_id: device_tracker.matthews_iphone_17_pro
            state: home
        then:
        - action: automation.turn_off
          data:
            stop_actions: true
          target:
            label_id: away_mode_disables
      - if:
        - condition: and
          conditions:
          - condition: state
            entity_id: input_boolean.iphone_sleep_focus_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.iphone_charging
            state: 'on'
        then:
        - action: automation.turn_off
          data:
            stop_actions: true
          target:
            label_id: sleeping_disabled
  mode: single
