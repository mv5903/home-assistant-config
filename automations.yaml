    data:
      transition: 5
    target:
      entity_id:
      - light.living_room_vertical_light_strip
      - light.living_room_pegboard_light_strip
  - action: light.turn_on
    data:
      brightness_pct: 5
      transition: 5
    target:
      entity_id:
      - light.desk_lamp
      - light.desk_light_strips
      - light.cubby
