      milliseconds: 0
  - action: light.turn_on
    metadata: {}
    data:
      brightness_pct: 1
      rgb_color:
      - 255
      - 0
      - 0
    target:
      device_id: e9afd45f3065823eabf2ebdab37800e9
  mode: single
- id: '1768528427688'
  alias: 'Lighting: Bathroom Night Path'
  description: Illuminates path to bathroom during sleep mode
  triggers:
  - type: occupied
    device_id: ddcfc3b69328d9678089d111a1ace821
    entity_id: 7d42b49068568a0220f2652076c1cb45
