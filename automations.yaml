    Only runs after sunset (when adaptive lighting has shifted warm).'
  triggers:
  - trigger: state
    entity_id: media_player.matthews_bedroom_2
    to: playing
  conditions:
  - condition: state
    entity_id: input_boolean.eating_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.eating_mode_user_cancelled
    state: 'off'
  - condition: template
    value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''media_content_type'')
      != ''music'' }}'
  - condition: numeric_state
    entity_id: sensor.kitchen_motion_sensor_trigger_last_15m
    above: 3
  - condition: or
    conditions:
    - condition: sun
      after: sunset
    - condition: sun
      before: sunrise
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.eating_mode
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: "\U0001F37D️ Eating Mode On"
      message: Detected kitchen activity + Apple TV playing. Eating mode activated.
        Tap to cancel.
      data:
        actions:
        - action: CANCEL_EATING_MODE
          title: Turn Off
        channel: Home Notifications
  mode: single
- id: '1773594557138'
  alias: 'Lighting: Auto Eating Mode Off'
  description: 'Turns off eating mode and clears the user-cancelled flag when: Apple
    TV stops playing for 5 mins, eating mode has been on for 30 minutes, or at midnight
    as a failsafe.'
  triggers:
  - trigger: state
    entity_id: media_player.matthews_bedroom_2
    from: playing
    to:
    - paused
    - idle
    - standby
    for:
      minutes: 5
  - trigger: state
    entity_id: input_boolean.eating_mode
    to: 'on'
    for:
      minutes: 30
  - trigger: time
    at: 00:00:00
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.eating_mode
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.eating_mode_user_cancelled
  mode: single
- id: '1773594562680'
  alias: 'Notification: Cancel Eating Mode'
  description: Handles the cancel notification action for eating mode. Sets a user-cancelled
    flag so auto-detect won't re-trigger for this session.
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: CANCEL_EATING_MODE
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.eating_mode
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.eating_mode_user_cancelled
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: Eating Mode Off
      message: Got it, eating mode cancelled.
  mode: single
- id: '1774978513749'
  alias: 'Climate: Apartment Fan On with Cooling'
  description: Turns on the Apartment Fan helper when the thermostat enters cool mode.
  triggers:
  - platform: state
    entity_id: climate.living_room
    to: cool
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.apartment_fan
  mode: single
- id: '1774978519324'
  alias: 'Climate: Apartment Fan Off When Not Cooling'
  description: Turns off the Apartment Fan helper when the thermostat turns off (e.g.
    when leaving home).
  triggers:
  - platform: state
    entity_id: climate.living_room
    to: 'off'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.apartment_fan
  mode: single
- id: '1775968647956'
  alias: Spooky Lights on Song Change
  description: When a song changes on the Apple TV, set all non-living-room WLED strip
    lights to random colors from a deep spooky palette (purples, crimsons, midnight
    blues, dark teals, embers). Sets effect to Solid first so WLED strips accept the
    color.
  triggers:
  - attribute: media_title
    entity_id: media_player.matthews_bedroom_2
    platform: state
  conditions:
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    state: playing
  - condition: template
    value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''media_title'')
      not in [None, '''', ''unknown'', ''unavailable''] }}'
  actions:
  - repeat:
      for_each:
      - light.bed_frame_light_strips
      - light.bedroom_nightstand_light_strip
      - light.bed_lamp
      - light.desk_lamp
      - light.living_room_lamp
      - light.kitchen_sink_light_strip
      - light.shoerack_light
      - light.bathroom_light_strip
      sequence:
      - condition: template
        value_template: '{{ is_state(repeat.item, ''on'') }}'
      - data:
          effect: Solid
          rgb_color: '{% set colors = [[120, 0, 200], [150, 30, 120], [180, 20, 20],
            [20, 40, 150], [0, 130, 90], [160, 0, 0], [80, 0, 160], [200, 80, 10],
            [30, 150, 50], [100, 0, 80], [140, 10, 60], [10, 20, 100]] %}{{ colors
            | random }}'
          transition: 2
        target:
          entity_id: '{{ repeat.item }}'
        action: light.turn_on
  mode: restart
- id: '1775970525307'
  alias: 'Music: Album Art WLED Controller'
  description: When Node-RED writes album art RGB to input_text.album_art_color, extract
    hue, max saturation, and apply to living room WLED strips. If random scene active
    (adaptive paused), apply effects from input_selects to ALL strips + album art
    color. If adaptive lighting is running (white lights), only set TV stand strip
    to Solid + album art color.
  triggers:
  - platform: state
    entity_id: input_text.album_art_color
  conditions:
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    state: playing
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    attribute: app_name
    state: Music
  - condition: template
    value_template: '{{ states(''input_text.album_art_color'') | regex_match(''^\d+,\d+,\d+$'')
      }}'
  actions:
  - choose:
    - alias: Random scene active - all strips get effects + album art color
      conditions:
      - condition: state
        entity_id: input_boolean.adaptive_lighting_paused
        state: 'on'
      sequence:
      - parallel:
        - target:
            entity_id: light.living_room_vertical_light_strip
          data:
            effect: '{{ states(''input_select.music_effect_vertical_strip'') }}'
            hs_color: '{{ sat_hs }}'
            brightness: 255
          action: light.turn_on
        - target:
            entity_id: light.living_room_tv_stand_light_strip
          data:
            effect: '{{ states(''input_select.music_effect_tv_stand_strip'') }}'
            hs_color: '{{ sat_hs }}'
            brightness: 255
          action: light.turn_on
        - target:
            entity_id: light.living_room_bookshelf_light_strips
          data:
            effect: '{{ states(''input_select.music_effect_bookshelf_strips'') }}'
            hs_color: '{{ sat_hs }}'
            brightness: 255
          action: light.turn_on
        - target:
            entity_id: light.desk_light_strips
          data:
            effect: '{{ states(''input_select.music_effect_desk_strips'') }}'
            hs_color: '{{ sat_hs }}'
            brightness: 255
          action: light.turn_on
        - target:
            entity_id: light.living_room_pegboard_light_strip
          data:
            effect: '{{ states(''input_select.music_effect_pegboard_strip'') }}'
            hs_color: '{{ sat_hs }}'
            brightness: 255
          action: light.turn_on
    - alias: White lights mode - only TV stand with Solid
      conditions:
      - condition: state
        entity_id: input_boolean.adaptive_lighting_paused
        state: 'off'
      sequence:
      - target:
          entity_id: light.living_room_tv_stand_light_strip
        data:
          effect: Solid
          hs_color: '{{ sat_hs }}'
          brightness: 255
        action: light.turn_on
  mode: restart
  variables:
    parts: '{{ states(''input_text.album_art_color'').split('','') | map(''int'')
      | list }}'
    r: '{{ parts[0] / 255.0 }}'
    g: '{{ parts[1] / 255.0 }}'
    b: '{{ parts[2] / 255.0 }}'
    cmax: '{{ [r|float, g|float, b|float] | max }}'
    cmin: '{{ [r|float, g|float, b|float] | min }}'
    delta: '{{ cmax|float - cmin|float }}'
    hue: '{% if delta|float < 0.01 %}0{% elif (cmax|float - r|float)|abs < 0.001 %}{{
      (60 * (((g|float - b|float) / delta|float) % 6)) | round(1) }}{% elif (cmax|float
      - g|float)|abs < 0.001 %}{{ (60 * (((b|float - r|float) / delta|float) + 2))
      | round(1) }}{% else %}{{ (60 * (((r|float - g|float) / delta|float) + 4)) |
      round(1) }}{% endif %}'
    sat_hs: '{{ [hue|float, 100] }}'
