- id: '1762487108563'
  alias: 'Lighting: Effect Handler'
  description: Changes light effects based on Apple TV media type (music vs video).
    Uses input_select helpers for per-light effect selection. Only sends commands
    if effect needs to change.
  triggers:
  - platform: state
    entity_id:
    - media_player.matthews_bedroom_2
    for:
      hours: 0
      minutes: 0
      seconds: 5
  - platform: time_pattern
    seconds: /30
  conditions:
  - condition: not
    conditions:
    - condition: or
      conditions:
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state:
        - unknown
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state:
        - unavailable
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state:
    - 'off'
  actions:
  - if:
    - condition: and
      conditions:
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state:
        - Music
        attribute: app_name
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state:
        - playing
    then:
    - if:
      - condition: template
        value_template: '{{ state_attr(''light.living_room_vertical_light_strip'',
          ''effect'') != states(''input_select.music_effect_vertical_strip'') }}'
      then:
      - action: light.turn_on
        data:
          effect: '{{ states(''input_select.music_effect_vertical_strip'') }}'
        target:
          entity_id: light.living_room_vertical_light_strip
    - if:
      - condition: template
        value_template: '{{ state_attr(''light.living_room_tv_stand_light_strip'',
          ''effect'') != states(''input_select.music_effect_tv_stand_strip'') }}'
      then:
      - action: light.turn_on
        data:
          effect: '{{ states(''input_select.music_effect_tv_stand_strip'') }}'
        target:
          entity_id: light.living_room_tv_stand_light_strip
    - if:
      - condition: template
        value_template: '{{ state_attr(''light.living_room_bookshelf_light_strips'',
          ''effect'') != states(''input_select.music_effect_bookshelf_strips'') }}'
      then:
      - action: light.turn_on
        data:
          effect: '{{ states(''input_select.music_effect_bookshelf_strips'') }}'
        target:
          entity_id: light.living_room_bookshelf_light_strips
    - if:
      - condition: template
        value_template: '{{ state_attr(''light.desk_light_strips'', ''effect'') !=
          states(''input_select.music_effect_desk_strips'') }}'
      then:
      - action: light.turn_on
        data:
          effect: '{{ states(''input_select.music_effect_desk_strips'') }}'
        target:
          entity_id: light.desk_light_strips
    - if:
      - condition: template
        value_template: '{{ state_attr(''light.living_room_pegboard_light_strip'',
          ''effect'') != states(''input_select.music_effect_pegboard_strip'') }}'
      then:
      - action: light.turn_on
        data:
          effect: '{{ states(''input_select.music_effect_pegboard_strip'') }}'
        target:
          entity_id: light.living_room_pegboard_light_strip
    else:
    - if:
      - condition: and
        conditions:
        - condition: template
          value_template: '{{ state_attr(''light.living_room_vertical_light_strip'',
            ''effect'') != ''Solid'' }}'
        - condition: state
          entity_id: light.living_room_vertical_light_strip
          state:
          - 'on'
      then:
      - action: light.turn_on
        data:
          effect: Solid
          rgb_color: '{{ state_attr(''light.kitchen_sink_light_strip'', ''rgb_color'')
            }}'
          brightness: '{{ state_attr(''light.kitchen_sink_light_strip'', ''brightness'')
            }}'
        target:
          entity_id:
          - light.living_room_vertical_light_strip
          - light.living_room_tv_stand_light_strip
          - light.living_room_bookshelf_light_strips
          - light.desk_light_strips
          - light.living_room_pegboard_light_strip
  mode: single
- id: adaptive_lighting_schedule
  alias: 'Lighting: Adaptive Sun Schedule'
  description: Updates light color temperature every 30 minutes based on sun elevation.
    Skips during sleep mode and when watching video.
  triggers:
  - minutes: /30
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: light.lights
    state: 'on'
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  - condition: not
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: media_player.matthews_bedroom_2
        state: playing
      - condition: template
        value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''app_name'')
          != ''Music'' }}'
  actions:
  - action: script.apply_adaptive_lighting
    data:
      target_lights:
        entity_id: '{{ expand(''light.lights'') | selectattr(''state'', ''eq'', ''on'')
          | map(attribute=''entity_id'') | list }}'
      transition: 10
  mode: single
- id: vacuum_after_cooking
  alias: 'Cleaning: Vacuum After Cooking'
  description: Schedules vacuum to clean kitchen after extended cooking activity.
    Mops if 3+ days since last mop.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.kitchen_motion_sensor_trigger_last_15m
    above: 24
  conditions: []
  actions:
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      data:
        actions:
        - action: CANCEL_VACUUM
          title: Cancel
        channel: Vacuum Notifications
        importance: high
        sticky: true
      title: Automatic Kitchen Cleanup Scheduled
      message: '{% set last_mop = states(''input_datetime.last_mop_use'') %}{% set
        days_since_mop = ((now().timestamp() - as_timestamp(last_mop, 0)) / 86400)
        | round(1) %}{% if days_since_mop >= 3 %}Vacuum + mop in 20 min ({{ days_since_mop
        }} days since last mop){% else %}Vacuum only in 20 min (mopped {{ days_since_mop
        }} days ago){% endif %}'
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.vacuum_will_auto_clean_kitchen
  - wait_for_trigger:
    - type: not_occupied
      device_id: 7a77497327e77c4f57494e46af1adda4
      entity_id: 45f4a4582c135ccff23030dc5d0394e3
      domain: binary_sensor
      trigger: device
      for:
        hours: 0
        minutes: 20
        seconds: 0
    timeout:
      hours: 2
      minutes: 0
      seconds: 0
    continue_on_timeout: true
  - if:
    - condition: state
      entity_id: input_boolean.vacuum_will_auto_clean_kitchen
      state: 'on'
    then:
    - if:
      - condition: template
        value_template: '{{ ((now().timestamp() - as_timestamp(states(''input_datetime.last_mop_use''),
          0)) / 86400) >= 3 }}'
      then:
      - action: vacuum.send_command
        target:
          entity_id: vacuum.vaccum
        data:
          command: set_properties
          params:
          - siid: 4
            piid: 4
            value: 2
      - delay:
          seconds: 2
      - action: dreame_vacuum.vacuum_clean_segment
        data:
          suction_level: 3
          segments:
          - 6
        target:
          entity_id: vacuum.vaccum
      - action: input_datetime.set_datetime
        data:
          timestamp: '{{ now().timestamp() }}'
        target:
          entity_id: input_datetime.last_mop_use
      else:
      - action: vacuum.send_command
        target:
          entity_id: vacuum.vaccum
        data:
          command: set_properties
          params:
          - siid: 4
            piid: 4
            value: 0
      - delay:
          seconds: 2
      - action: dreame_vacuum.vacuum_clean_segment
        data:
          suction_level: 3
          segments:
          - 6
        target:
          entity_id: vacuum.vaccum
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.vacuum_will_auto_clean_kitchen
    - delay:
        minutes: 15
  mode: single
- id: weekly_full_clean
  alias: 'Cleaning: Weekly Full Clean'
  description: Full apartment vacuum and mop every Tuesday at noon
  triggers:
  - trigger: time
    at: '12:00:00'
  conditions:
  - condition: time
    weekday:
    - tue
  actions:
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: Weekly Full Clean Starting
      message: Vacuum + mop for all rooms
  - action: vacuum.send_command
    target:
      entity_id: vacuum.vaccum
    data:
      command: set_properties
      params:
      - siid: 4
        piid: 4
        value: 2
  - delay:
      seconds: 2
  - action: dreame_vacuum.vacuum_clean_segment
    data:
      suction_level: 3
      segments:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    target:
      entity_id: vacuum.vaccum
  - action: input_datetime.set_datetime
    data:
      timestamp: '{{ now().timestamp() }}'
    target:
      entity_id: input_datetime.last_mop_use
  mode: single
