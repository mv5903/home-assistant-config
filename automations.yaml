- id: '1764891750525'
  alias: 'Safety: Soldering Iron Alert'
  description: Sends critical notification when soldering iron is left on, auto-turns
    off after 60s if no response
  triggers:
  - trigger: state
    entity_id:
    - switch.tapo_smart_plug_2
    to:
    - 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 0
  conditions: []
  actions:
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - if:
    - condition: state
      entity_id: switch.tapo_smart_plug_2
      state:
      - 'on'
    then:
    - action: notify.mobile_app_matthews_iphone_17_pro
      data:
        title: Soldering Iron Left On
        message: Respond OK to this notification to keep it on; otherwise, it will
          be shut off in 60 seconds.
        data:
          push:
            interruption-level: critical
          actions:
          - action: KEEP_IRON_ON
            title: Keep On
          - action: TURN_OFF_NOW
            title: Turn Off Now
    - delay:
        seconds: 60
    - if:
      - condition: state
        entity_id: switch.tapo_smart_plug_2
        state:
        - 'on'
      then:
      - action: switch.turn_off
        data: {}
        target:
          entity_id: switch.tapo_smart_plug_2
      - action: notify.mobile_app_matthews_iphone_17_pro
        data:
          title: Soldering Iron Auto-Off
          message: Soldering iron has been automatically turned off for safety.
  mode: single
- id: '1764892218525'
  alias: 'Safety: Soldering Iron Keep On'
  description: Handles Keep On notification action for soldering iron
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: KEEP_IRON_ON
  conditions: []
  actions:
  - action: automation.trigger
    target:
      entity_id: automation.soldering_iron_safety_notification
    data:
      skip_condition: true
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: Soldering Iron Timer Reset
      message: Timer reset. You have another 5 minutes.
  mode: single
- id: '1765080604283'
  alias: 'Safety: Soldering Pegboard Light'
  description: Shows red plasma effect on pegboard when soldering iron is on
  triggers:
  - trigger: state
    entity_id:
    - switch.tapo_smart_plug_2
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: switch.tapo_smart_plug_2
      state:
      - 'on'
    then:
    - action: light.turn_on
      data:
        rgb_color:
        - 255
        - 0
        - 0
        effect: Plasma
        brightness_pct: 100
      target:
