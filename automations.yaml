  - condition: state
    entity_id: input_boolean.eating_mode_user_cancelled
    state: 'off'
  - condition: template
    value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''media_content_type'')
      != ''music'' }}'
  - condition: numeric_state
    entity_id: sensor.kitchen_motion_sensor_trigger_last_15m
    above: 3
  - condition: or
    conditions:
    - condition: sun
      after: sunset
    - condition: sun
      before: sunrise
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.eating_mode
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: "\U0001F37D️ Eating Mode On"
      message: Detected kitchen activity + Apple TV playing. Eating mode activated.
        Tap to cancel.
      data:
        actions:
        - action: CANCEL_EATING_MODE
          title: Turn Off
        channel: Home Notifications
  mode: single
- id: '1773594557138'
  alias: 'Lighting: Auto Eating Mode Off'
  description: Turns off eating mode when Apple TV stops for 5 mins, eating mode has
    been on 30 minutes, or at midnight. Only the midnight trigger clears the user_cancelled
    flag — preserving the user's manual off decision for the rest of the evening.
  triggers:
  - entity_id: media_player.matthews_bedroom_2
    from: playing
    to:
    - paused
    - idle
    - standby
    for:
      minutes: 5
    platform: state
  - entity_id: input_boolean.eating_mode
    to: 'on'
    for:
      minutes: 30
    platform: state
  - at: 00:00:00
    platform: time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.platform == ''time'' and trigger.now.hour == 0
          }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.eating_mode
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.eating_mode_user_cancelled
    default:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.eating_mode
  mode: single
- id: '1773594562680'
  alias: 'Notification: Cancel Eating Mode'
  description: Handles the cancel notification action for eating mode. Sets a user-cancelled
    flag so auto-detect won't re-trigger for this session.
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: CANCEL_EATING_MODE
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.eating_mode
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.eating_mode_user_cancelled
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: Eating Mode Off
      message: Got it, eating mode cancelled.
  mode: single
- id: '1774978513749'
  alias: 'Climate: Apartment Fan On with Cooling'
  description: Turns on the Apartment Fan helper when the thermostat enters cool mode.
  triggers:
  - platform: state
    entity_id: climate.living_room
    to: cool
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.apartment_fan
  mode: single
- id: '1774978519324'
  alias: 'Climate: Apartment Fan Off When Not Cooling'
  description: Turns off the Apartment Fan helper when the thermostat turns off (e.g.
    when leaving home).
  triggers:
  - platform: state
    entity_id: climate.living_room
    to: 'off'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.apartment_fan
  mode: single
- id: '1775968647956'
  alias: Spooky Lights on Song Change
  description: When a song changes on the Apple TV, set all non-living-room WLED strip
    lights to random colors from a deep spooky palette. Only fires during music playback
    AND when adaptive lighting is paused (party/random mode active).
  triggers:
  - attribute: media_title
    entity_id: media_player.matthews_bedroom_2
    platform: state
  conditions:
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    state: playing
  - attribute: app_name
    condition: state
    entity_id: media_player.matthews_bedroom_2
    state: Music
  - condition: state
    entity_id: input_boolean.adaptive_lighting_paused
    state: 'on'
  - condition: template
    value_template: '{{ state_attr(''media_player.matthews_bedroom_2'', ''media_title'')
      not in [None, '''', ''unknown'', ''unavailable''] }}'
  actions:
  - repeat:
      for_each:
      - light.bed_frame_light_strips
      - light.bedroom_nightstand_light_strip
      - light.bed_lamp
      - light.desk_lamp
      - light.living_room_lamp
      - light.kitchen_sink_light_strip
      - light.shoerack_light
      - light.bathroom_light_strip
      sequence:
      - condition: template
        value_template: '{{ is_state(repeat.item, ''on'') }}'
      - action: light.turn_on
        data:
          effect: Solid
          rgb_color: '{% set colors = [[120, 0, 200], [150, 30, 120], [180, 20, 20],
            [20, 40, 150], [0, 130, 90], [160, 0, 0], [80, 0, 160], [200, 80, 10],
            [30, 150, 50], [100, 0, 80], [140, 10, 60], [10, 20, 100]] %}{{ colors
            | random }}'
          transition: 2
        target:
          entity_id: '{{ repeat.item }}'
  mode: restart
- id: music_album_art_wled_controller
  alias: 'Music: Album Art WLED Controller'
  description: 'When Node-RED writes album art RGB to input_text.album_art_color (Music
    playing): In random/color mode (adaptive_lighting_paused on), recolor ONLY the
    album-art lights that are currently on, via apply_current_color (primary hue everywhere,
    complementary on pegboard, per-light music effects, brightness preserved). Off
    lights are left alone and pick up the latest color when next turned on. In white
    mode, only the TV stand strip gets the album color (if on).'
  triggers:
  - entity_id: input_text.album_art_color
    trigger: state
  conditions:
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    state: playing
  - condition: state
    entity_id: media_player.matthews_bedroom_2
    attribute: app_name
    state: Music
  - condition: template
    value_template: '{{ states(''input_text.album_art_color'') | regex_match(''^\d+,\d+,\d+$'')
      }}'
  actions:
  - choose:
    - alias: Random/color mode - recolor only lights that are on
      conditions:
      - condition: state
        entity_id: input_boolean.adaptive_lighting_paused
        state: 'on'
      sequence:
      - action: script.apply_current_color
        data:
          targets: '{{ on_album_lights }}'
          transition: 1
    - alias: White mode - TV stand only gets album color
      conditions:
      - condition: state
        entity_id: input_boolean.adaptive_lighting_paused
        state: 'off'
      - condition: state
        entity_id: light.living_room_tv_stand_light_strip
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          effect: Solid
          hs_color: '{{ primary_hs }}'
          brightness: 255
        target:
          entity_id: light.living_room_tv_stand_light_strip
  mode: restart
  variables:
    art_hue: '{% set p=states(''input_text.album_art_color'').split('','') %}{% set
      r=p[0]|int(0)/255 %}{% set g=p[1]|int(0)/255 %}{% set b=p[2]|int(0)/255 %}{%
      set mx=[r,g,b]|max %}{% set mn=[r,g,b]|min %}{% set d=mx-mn %}{% set h=0 if
      d==0 else (60*(((g-b)/d)%6) if mx==r else (60*((b-r)/d+2) if mx==g else 60*((r-g)/d+4)))
      %}{{ ((h+360)%360)|round(1) }}'
    primary_hs: '{{ [art_hue|float(0), 100] }}'
    on_album_lights: '{{ [''light.living_room_vertical_light_strip'',''light.living_room_tv_stand_light_strip'',''light.living_room_bookshelf_light_strips'',''light.desk_light_strips'',''light.living_room_pegboard_light_strip'',''light.kitchen_sink_light_strip'',''light.bedroom_nightstand_light_strip'',''light.bed_frame_light_strips'',''light.bathroom_light_strip'',''light.cubby'',''light.desk_lamp'',''light.living_room_lamp'',''light.bed_lamp'',''light.shoerack_light'']
      | select(''is_state'',''on'') | list }}'
- id: lighting_color_mode_deactivate
  alias: 'Lighting: Color Mode Deactivate'
  description: When Color/RGB mode is turned off, recolor all managed lights that
    are currently ON back to adaptive white via apply_current_color. Does NOT turn
    any lights on or off - RGB mode only affects color, never on/off state. Skips
    if sleep mode is active.
  triggers:
  - entity_id: input_boolean.adaptive_lighting_paused
    to: 'off'
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  actions:
  - action: script.apply_current_color
    data:
      targets: '{{ expand(''light.lights'') | selectattr(''state'',''eq'',''on'')
        | map(attribute=''entity_id'') | list }}'
      transition: 5
  - action: select.select_option
    data:
      option: All
    target:
      entity_id: select.nintendo_toy_mode_selector
  mode: single
- id: '1758584148000'
  alias: 'Lighting: Bathroom Presence'
  description: Presence-based bathroom lighting with sleep mode awareness
  triggers:
  - entity_id:
    - binary_sensor.bathroom_presence_presence
    platform: state
    to: 'on'
  - entity_id:
    - binary_sensor.bathroom_presence_presence
    for:
      seconds: 30
    platform: state
    to: 'off'
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: binary_sensor.bathroom_presence_presence
      state: 'on'
    then:
    - if:
      - condition: state
        entity_id: input_boolean.iphone_sleep_focus_mode
        state: 'on'
      then:
      - action: script.apply_adaptive_lighting
        data:
          override_mode: bedtime
          target_lights:
            entity_id: light.bathroom_light_strip
          transition: 0
      else:
      - condition: state
        entity_id: light.bathroom_light_strip
        state: 'off'
      - if:
        - condition: state
          entity_id: input_boolean.adaptive_lighting_paused
          state: 'off'
        then:
        - action: script.apply_adaptive_lighting
          data:
            target_lights:
              entity_id: light.bathroom_light_strip
            transition: 0
        else:
        - action: light.turn_on
          target:
            entity_id: light.bathroom_light_strip
    else:
    - action: light.turn_off
      data: {}
      target:
        entity_id: light.bathroom_light_strip
  mode: single
- id: '1762485541183'
  alias: 'Lighting: Bedroom Presence'
  description: Presence-based lighting using adaptive lighting - requires both presence
    off AND moving distance > 100 to turn off. Time check recovers from brief sensor
    drops but only if lights just turned off (within 10s). In Color Mode, restores
    last light color instead of applying adaptive lighting.
  triggers:
  - entity_id:
    - binary_sensor.esphome_web_cb9878_presence
    to: 'off'
    for:
      seconds: 5
    id: presence_off
    platform: state
  - seconds: /10
    id: time_check
    platform: time_pattern
  - type: occupied
    device_id: ddcfc3b69328d9678089d111a1ace821
    entity_id: 7d42b49068568a0220f2652076c1cb45
    domain: binary_sensor
    id: motion_detected
    platform: device
  - entity_id:
    - binary_sensor.esphome_web_cb9878_presence
    to: 'on'
    id: presence_on
    platform: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: presence_on
      - condition: state
        entity_id: input_boolean.iphone_sleep_focus_mode
        state: 'off'
      - condition: state
        entity_id: light.bedroom_nightstand_light_strip
        state: 'off'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.adaptive_lighting_paused
          state: 'off'
        then:
        - action: script.apply_adaptive_lighting
          data:
            target_lights:
              area_id: matthews_bedroom
            transition: 0
        else:
        - action: light.turn_on
          target:
            area_id: matthews_bedroom
    - conditions:
      - condition: trigger
        id: presence_off
      - condition: numeric_state
        entity_id: sensor.esphome_web_cb9878_moving_distance
        above: 100
      sequence:
      - action: light.turn_off
        data:
          transition: 0
        target:
          area_id: matthews_bedroom
    - conditions:
      - condition: trigger
        id: motion_detected
      - condition: state
        entity_id: input_boolean.iphone_sleep_focus_mode
        state: 'off'
      - condition: state
        entity_id: light.bedroom_nightstand_light_strip
        state: 'off'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.adaptive_lighting_paused
          state: 'off'
        then:
        - action: script.apply_adaptive_lighting
          data:
            target_lights:
              area_id: matthews_bedroom
            transition: 0
        else:
        - action: light.turn_on
          target:
            area_id: matthews_bedroom
    - conditions:
      - condition: trigger
        id: time_check
      - condition: state
        entity_id: binary_sensor.esphome_web_cb9878_presence
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.esphome_web_cb9878_moving_distance
        below: 100
      - condition: state
        entity_id: input_boolean.iphone_sleep_focus_mode
        state: 'off'
      - condition: state
        entity_id: light.bedroom_nightstand_light_strip
        state: 'off'
      - condition: template
        value_template: '{{ (now() - states.light.bedroom_nightstand_light_strip.last_changed).total_seconds()
          < 10 }}'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.adaptive_lighting_paused
          state: 'off'
        then:
        - action: script.apply_adaptive_lighting
          data:
            target_lights:
              area_id: matthews_bedroom
            transition: 0
        else:
        - action: light.turn_on
          target:
            area_id: matthews_bedroom
  mode: single
- id: '1776659653318'
  alias: 'Lighting: Manual Eating Mode Off → Set Cancelled Flag'
  description: When eating mode is manually turned off (not by the auto-off automation),
    set the user_cancelled flag so auto-detect won't re-trigger for this session.
    The auto-off automation clears the flag when appropriate (Apple TV stops, 30min
    timeout, or midnight).
  triggers:
  - platform: state
    entity_id: input_boolean.eating_mode
    to: 'off'
  conditions:
  - condition: state
    entity_id: input_boolean.eating_mode_user_cancelled
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.eating_mode_user_cancelled
  mode: single
- id: lighting_color_mode_activate
  alias: 'Lighting: Color Mode Activate'
  description: When Color Mode is turned on via the dashboard toggle, immediately
    fires the party lights automation to set random RGB colors apartment-wide. Music
    sync then takes over as tracks change.
  triggers:
  - entity_id: input_boolean.adaptive_lighting_paused
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - action: automation.trigger
    data:
      skip_condition: true
    target:
      entity_id: automation.lighting_random_rgb_colors
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.nintendo_toy_mode_selector
    data:
      option: Alternating
  mode: single
- id: '1776706100250'
  alias: 'System: Nintendo Toy Disconnected'
  description: When the ESP toy disconnects, clears the processing lock so the UI
    doesn't stay locked.
  triggers:
  - platform: state
    entity_id: sensor.nintendo_toy_toy_mode
    to: unavailable
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.nintendo_toy_processing
  mode: single
- id: climate_sleep_fan_keep_alive
  alias: 'Climate: Sleep Fan Keep Alive'
  description: Resets the Nest fan timer every 14 minutes during sleep mode. Necessary
    because Nest's fan_mode 'on' via the SDM API only runs for 15 minutes by default
    — there's no way to pass a longer duration through HA's climate service.
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.iphone_sleep_focus_mode
    to: 'on'
  conditions: []
  actions:
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.iphone_sleep_focus_mode
        state: 'on'
      sequence:
      - action: climate.set_fan_mode
        data:
          fan_mode: 'on'
        target:
          entity_id: climate.living_room
      - delay:
          minutes: 14
  mode: restart
- id: '1781673379940'
  alias: 'Maint: Restart Home Assistant'
  description: ''
  triggers:
  - trigger: time_pattern
    hours: '5'
  conditions: []
  actions:
  - action: homeassistant.restart
    metadata: {}
    data: {}
  mode: single
- id: '1781800384750'
  alias: Apartment Watch — New Availability Push
  description: Pushes a high-importance notification when changedetection.io reports
    a new unit at a watched JC building. Triggered by webhook 'apartment_watch'.
  triggers:
  - trigger: webhook
    webhook_id: apartment_watch
    allowed_methods:
    - POST
    local_only: false
  actions:
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: "{{ trigger.json.title | default('\U0001F3E0 New apartment availability',
        true) }}"
      message: '{{ trigger.json.message | default(''A new unit was just listed.'',
        true) }}'
      data:
        push:
          interruption-level: time-sensitive
          sound: default
        url: https://watch.mattvandenberg.com
        tag: apartments
        channel: Apartments
        importance: high
        notification_icon: mdi:home-search
  mode: queued
  max: 10
- id: ps5_pro_watch_price_drop
  alias: PS5 Pro Watch — Price Drop Push
  description: Pushes a notification when the PS5 Pro price watcher (Playwright on
    docker.home) POSTs a price drop to the webhook.
  triggers:
  - platform: webhook
    webhook_id: ps5_pro_watch
    local_only: false
    allowed_methods:
    - POST
  conditions: []
  actions:
  - data:
      title: "{{ trigger.json.title | default('\U0001F3AE PS5 Pro price drop', true)
        }}"
      message: '{{ trigger.json.message | default(''A PS5 Pro price changed.'', true)
        }}'
      data:
        push:
          interruption-level: time-sensitive
          sound: default
        tag: ps5-pro
        channel: PS5 Pro
        importance: high
        notification_icon: mdi:sony-playstation
        color: '#003791'
    action: notify.mobile_app_matthews_iphone_17_pro
  mode: queued
