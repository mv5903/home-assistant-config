- id: adaptive_lighting_schedule
  alias: 'Lighting: Adaptive Sun Schedule'
  description: Every 30 minutes, refresh adaptive white color temperature on all managed
    lights that are currently on, via apply_current_color (which preserves each light's
    brightness, so theater-dimmed lights keep their 5% and just track color temp).
    Skips during sleep mode or Color/RGB mode.
  triggers:
  - minutes: /30
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: light.lights
    state: 'on'
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.adaptive_lighting_paused
    state: 'off'
  actions:
  - action: script.apply_current_color
    data:
      targets: '{{ expand(''light.lights'') | selectattr(''state'',''eq'',''on'')
        | map(attribute=''entity_id'') | list }}'
      transition: 10
  mode: single
- id: vacuum_after_cooking
  alias: 'Cleaning: Vacuum After Cooking'
  description: Schedules vacuum to clean kitchen after extended cooking activity.
    Mops if 3+ days since last mop.
  triggers:
  - entity_id:
    - sensor.kitchen_motion_sensor_trigger_last_15m
    above: 24
    platform: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  actions:
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      data:
        actions:
        - action: CANCEL_VACUUM
          title: Cancel
        channel: Vacuum Notifications
        importance: high
        sticky: true
      title: Automatic Kitchen Cleanup Scheduled
      message: '{% set last_mop = states(''input_datetime.last_mop_use'') %}{% set
        days_since_mop = ((now().timestamp() - as_timestamp(last_mop, 0)) / 86400)
        | round(1) %}{% if days_since_mop >= 3 %}Vacuum + mop in 20 min ({{ days_since_mop
        }} days since last mop){% else %}Vacuum only in 20 min (mopped {{ days_since_mop
        }} days ago){% endif %}'
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.vacuum_will_auto_clean_kitchen
  - wait_for_trigger:
    - type: not_occupied
      device_id: 7a77497327e77c4f57494e46af1adda4
      entity_id: 45f4a4582c135ccff23030dc5d0394e3
      domain: binary_sensor
      trigger: device
      for:
        hours: 0
        minutes: 20
        seconds: 0
    timeout:
      hours: 2
      minutes: 0
      seconds: 0
    continue_on_timeout: true
  - if:
    - condition: state
      entity_id: input_boolean.vacuum_will_auto_clean_kitchen
      state: 'on'
    - condition: state
      entity_id: input_boolean.iphone_sleep_focus_mode
      state: 'off'
    then:
    - if:
      - condition: template
        value_template: '{{ ((now().timestamp() - as_timestamp(states(''input_datetime.last_mop_use''),
          0)) / 86400) >= 3 }}'
      then:
      - action: vacuum.send_command
        target:
          entity_id: vacuum.vaccum
        data:
          command: set_properties
          params:
          - siid: 4
            piid: 4
            value: 2
      - delay:
          seconds: 2
      - action: dreame_vacuum.vacuum_clean_segment
        data:
          suction_level: 3
          segments:
          - 6
        target:
          entity_id: vacuum.vaccum
      - action: input_datetime.set_datetime
        data:
          timestamp: '{{ now().timestamp() }}'
        target:
          entity_id: input_datetime.last_mop_use
      else:
      - action: vacuum.send_command
        target:
          entity_id: vacuum.vaccum
        data:
          command: set_properties
          params:
          - siid: 4
            piid: 4
            value: 0
      - delay:
          seconds: 2
      - action: dreame_vacuum.vacuum_clean_segment
        data:
          suction_level: 3
          segments:
          - 6
        target:
          entity_id: vacuum.vaccum
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.vacuum_will_auto_clean_kitchen
    - delay:
        minutes: 15
  mode: single
- id: weekly_full_clean
  alias: 'Cleaning: Weekly Full Clean'
  description: Full apartment vacuum and mop every Tuesday at noon
  triggers:
  - at: '12:00:00'
    platform: time
  conditions:
  - condition: time
    weekday:
    - tue
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  actions:
  - action: notify.mobile_app_matthews_iphone_17_pro
    data:
      title: Weekly Full Clean Starting
      message: Vacuum + mop for all rooms
  - action: vacuum.send_command
    target:
      entity_id: vacuum.vaccum
    data:
      command: set_properties
      params:
      - siid: 4
        piid: 4
        value: 2
  - delay:
      seconds: 2
  - action: dreame_vacuum.vacuum_clean_segment
    data:
      suction_level: 3
      segments:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    target:
      entity_id: vacuum.vaccum
  - action: input_datetime.set_datetime
    data:
      timestamp: '{{ now().timestamp() }}'
    target:
      entity_id: input_datetime.last_mop_use
  mode: single
- id: media_theater_mode_off
  alias: 'Media: Theater Mode Off'
  description: When the Apple TV has been paused/idle/stopped for 10 seconds, bring
    the five theater lights (vertical, pegboard, desk lamp, desk strip, cubby) back
    to full brightness at the current color (RGB album-art or adaptive white) via
    apply_current_color. The 10s hold prevents brief pauses/scrubbing from flapping
    the lights.
  triggers:
  - entity_id: media_player.matthews_bedroom_2
    to: paused
    for:
      seconds: 10
    trigger: state
  - entity_id: media_player.matthews_bedroom_2
    to: idle
    for:
      seconds: 10
    trigger: state
  - entity_id: media_player.matthews_bedroom_2
    to: standby
    for:
      seconds: 10
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.iphone_sleep_focus_mode
    state: 'off'
  actions:
  - action: script.apply_current_color
    data:
      brightness_pct: 100
      targets:
      - light.living_room_vertical_light_strip
      - light.living_room_pegboard_light_strip
      - light.desk_lamp
      - light.desk_light_strips
      - light.cubby
      transition: 3
  mode: restart
